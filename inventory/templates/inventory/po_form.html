<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. Page Setup */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }

        /* 2. Form Card */
        .form-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #ddd;
            width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 1.5rem;
        }

        /* 3. Django Form Fields (form.as_p) */
        form p {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
            color: #555;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            font-size: 14px;
        }

        input:focus, select:focus {
            border-color: #007bff;
            outline: none;
            background-color: #fff;
        }

        /* 4. Action Button */
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* 5. Helpful Note */
        .info-note {
            background-color: #fff9db;
            border-left: 4px solid #fcc419;
            padding: 10px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Create Purchase Order</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Order</button>
    </form>

    <div class="info-note">
        <strong>Note:</strong> Stock will only increase automatically if the status is set to <b>'RECEIVED'</b>.
    </div>
    
    <p style="text-align: center; margin-top: 15px;">
        <a href="{% url 'po_list' %}" style="color: #666; text-decoration: none; font-size: 14px;">← Cancel</a>
    </p>
</div>

</body>
</html>
