<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. Basic Page Setup */
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f9f9f9;
            color: #333;
        }

        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        /* 2. Style Links to look like Buttons */
        a {
            text-decoration: none;
            color: #007bff;
        }

        .add-btn {
            background-color: #28a745;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            display: inline-block;
        }

        .back-link {
            color: #666;
            font-size: 14px;
        }

        /* 3. Simple Table Styling */
        table {
            width: 100%;
            border-collapse: collapse; /* Removes double borders */
            background-color: white;
            margin-top: 10px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        /* Highlight the row when hovering */
        tr:hover {
            background-color: #f5f5f5;
        }

        /* 4. Alert for Low Stock */
        .low-stock {
            color: red;
            font-weight: bold;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <h2>Product Inventory</h2>
    
    <a href="{% url 'dashboard' %}" class="back-link">← Back to Dashboard</a>
    <br/><br/>
    
    <a href="{% url 'product_create' %}" class="add-btn">Add New Product</a>

    <br/><br/>

    <table>
        <thead>
            <tr>
                <th>SKU</th>
                <th>Name</th>
                <th>Stock</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
            <tr>
                <td>{{ product.sku }}</td>
                <td>
                    {{ product.name }} 
                    {% if product.is_low_stock %}
                        <span class="low-stock">(LOW)</span>
                    {% endif %}
                </td>
                <td>{{ product.stock_level }}</td>
                <td>${{ product.price }}</td>
                <td>
                    <a href="{% url 'product_update' product.id %}">Edit</a> |
                    <a href="{% url 'product_delete' product.id %}" style="color: red;">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>
</html>
