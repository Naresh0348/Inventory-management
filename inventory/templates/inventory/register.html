<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. Basic Reset */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        /* 2. The Main Box */
        .container {
            background: white;
            padding: 20px 40px;
            border: 1px solid #ccc;
            border-radius: 8px;
            width: 350px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        /* 3. Styling the Django form inputs */
        form p {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box; /* keeps input inside the box */
        }

        /* 4. The Button */
        button {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* 5. The Link at the bottom */
        .footer-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Staff Registration</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

    <p class="footer-link">
        Already have an account? <a href="{% url 'login' %}">Login here</a>
    </p>
</div>

</body>
</html>
