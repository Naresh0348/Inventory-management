<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* 1. Basic Setup */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fff5f5; /* Very light red background */
            display: flex;
            justify-content: center;
            padding-top: 100px;
            margin: 0;
        }

        /* 2. The Warning Card */
        .delete-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            text-align: center;
            border: 1px solid #feb2b2;
        }

        h2 {
            color: #c53030;
            margin-top: 0;
            font-size: 24px;
        }

        p {
            color: #4a5568;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        strong {
            color: #2d3748;
            word-break: break-all;
        }

        /* 3. Action Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #e53e3e; /* Solid Red */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #c53030;
        }

        button:active {
            transform: scale(0.98);
        }

        .cancel-link {
            display: inline-block;
            color: #718096;
            text-decoration: none;
            font-size: 14px;
            padding: 8px;
        }

        .cancel-link:hover {
            color: #2d3748;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="delete-card">
    <h2>⚠️ Confirm Delete</h2>
    <p>Are you sure you want to delete the product: <br><strong>{{ product.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <div class="btn-group">
            <button type="submit">Yes, Delete Product</button>
            <a href="{% url 'product_list' %}" class="cancel-link">No, Keep Product</a>
        </div>
    </form>
</div>

</body>
</html>
